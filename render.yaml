services:
  - type: web
    name: faip-backend
    plan: free
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: faip-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: faip-db
    plan: free
